<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng thông tin Bác sĩ - Phòng Khám XYZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-panel {
            transition: all 0.3s ease-in-out;
            max-height: 0;
            overflow: hidden;
            padding-top: 0;
            padding-bottom: 0;
        }
        .details-panel.open {
            max-height: 500px; /* Adjust as needed */
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-20">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600">BÁC SĨ - PHÒNG KHÁM XYZ</h1>
            <div>
                <span class="text-gray-700 mr-4">Chào mừng, Dr. Nguyễn Văn An!</span>
                <button id="logout-button" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 text-sm font-medium">Đăng xuất</button>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Cột 1: Lịch Hẹn Chờ Khám -->
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-3">Lịch Hẹn Hôm Nay</h2>
                <div id="upcoming-list" class="space-y-4 max-h-[70vh] overflow-y-auto">
                    <div id="no-upcoming" class="text-center text-gray-500 py-10">
                        <p>Không có lịch hẹn nào chờ khám.</p>
                    </div>
                </div>
            </div>

            <!-- Cột 2: Đã Khám Xong -->
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-3">Bệnh Nhân Đã Khám</h2>
                <div id="completed-list" class="space-y-4 max-h-[70vh] overflow-y-auto">
                    <div id="no-completed" class="text-center text-gray-500 py-10">
                        <p>Chưa có bệnh nhân nào được khám xong.</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

<script>
document.addEventListener('DOMContentLoaded', function () {
    // --- DOM Elements ---
    const upcomingListContainer = document.getElementById('upcoming-list');
    const completedListContainer = document.getElementById('completed-list');
    const noUpcomingMsg = document.getElementById('no-upcoming');
    const noCompletedMsg = document.getElementById('no-completed');
    
    // --- DATA SIMULATION ---
    const getAppointments = () => JSON.parse(localStorage.getItem('clinic_appointments')) || [];
    const saveAppointments = (data) => localStorage.setItem('clinic_appointments', JSON.stringify(data));

    // --- UI RENDERING ---
    function renderLists() {
        const appointments = getAppointments();
        const upcomingAppointments = appointments.filter(a => a.status === 'approved' && !a.doctorNotes);
        const completedAppointments = appointments.filter(a => a.status === 'approved' && a.doctorNotes);
        
        renderList(upcomingListContainer, upcomingAppointments, noUpcomingMsg, 'upcoming');
        renderList(completedListContainer, completedAppointments, noCompletedMsg, 'completed');
    }

    function renderList(container, data, noDataMsg, type) {
        container.innerHTML = '';
        if (data.length > 0) {
            noDataMsg.classList.add('hidden');
            data.forEach(appt => {
                const card = createAppointmentCard(appt, type);
                container.appendChild(card);
            });
        } else {
            container.appendChild(noDataMsg);
            noDataMsg.classList.remove('hidden');
        }
    }

    function createAppointmentCard(appt, type) {
        const card = document.createElement('div');
        card.className = `p-4 rounded-lg transition-all duration-300 ${type === 'upcoming' ? 'bg-blue-50' : 'bg-gray-50'}`;
        card.dataset.id = appt.id;

        const isCompleted = type === 'completed';
        const buttonText = isCompleted ? 'Sửa chẩn đoán' : 'Khám Bệnh';
        const buttonColor = isCompleted ? 'bg-gray-500 hover:bg-gray-600' : 'bg-blue-500 hover:bg-blue-600';

        card.innerHTML = `
            <div class="card-header flex justify-between items-center cursor-pointer">
                <div>
                    <p class="font-bold text-gray-800">${appt.patientFullname}</p>
                    <p class="text-sm text-gray-600">${new Date(appt.date).toLocaleDateString('vi-VN')} - ${appt.time}</p>
                </div>
                <button class="toggle-details-btn px-4 py-2 text-white text-sm font-medium rounded-lg ${buttonColor}">${buttonText}</button>
            </div>
            <div class="details-panel mt-2 border-t border-gray-200">
                <div class="pt-4">
                    <p class="text-sm mb-2"><span class="font-semibold">Lý do khám:</span> ${appt.reason}</p>
                    <div>
                        <label for="notes-${appt.id}" class="block text-gray-700 font-semibold mb-2">Chẩn Đoán và Ghi Chú:</label>
                        <textarea id="notes-${appt.id}" rows="5" class="w-full px-3 py-2 border rounded-lg" placeholder="Nhập chẩn đoán bệnh...">${isCompleted ? appt.doctorNotes : ''}</textarea>
                    </div>
                    <div class="text-right mt-3">
                        <button class="save-notes-btn px-6 py-2 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700">Lưu</button>
                    </div>
                </div>
            </div>
        `;
        return card;
    }

    // --- EVENT HANDLING ---
    function handleListClick(event) {
        const toggleBtn = event.target.closest('.toggle-details-btn');
        const saveBtn = event.target.closest('.save-notes-btn');

        if (toggleBtn) {
            const card = toggleBtn.closest('.p-4');
            const detailsPanel = card.querySelector('.details-panel');
            
            // Close any other open panels
            document.querySelectorAll('.details-panel.open').forEach(panel => {
                if (panel !== detailsPanel) {
                    panel.classList.remove('open');
                }
            });
            
            detailsPanel.classList.toggle('open');
        }

        if (saveBtn) {
            const card = saveBtn.closest('.p-4');
            const appointmentId = card.dataset.id;
            const notesTextarea = card.querySelector('textarea');
            const notes = notesTextarea.value.trim();

            if (!notes) {
                alert('Vui lòng nhập chẩn đoán.');
                return;
            }

            saveExamination(appointmentId, notes);
        }
    }

    function saveExamination(appointmentId, notes) {
        let appointments = getAppointments();
        const apptIndex = appointments.findIndex(a => a.id === appointmentId);
        
        if (apptIndex === -1) {
            alert('Lỗi: Không tìm thấy lịch hẹn.');
            return;
        }
        
        appointments[apptIndex].doctorNotes = notes;
        
        saveAppointments(appointments);
        renderLists(); // Re-render to move the card to the completed list
    }

    // --- EVENT LISTENERS ---
    upcomingListContainer.addEventListener('click', handleListClick);
    completedListContainer.addEventListener('click', handleListClick);

    // --- INITIALIZATION ---
    renderLists();
});
</script>

</body>
</html>
